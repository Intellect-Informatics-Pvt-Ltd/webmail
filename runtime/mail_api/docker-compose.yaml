# ── PSense Mail — Base services ──────────────────────────────────────────
#
# Usage:
#   Dev:   docker compose -f docker-compose.yaml -f docker-compose.dev.yaml up
#   Prod:  docker compose -f docker-compose.yaml -f docker-compose.prod.yaml up
#
# MongoDB is deployed separately — configure via MONGO__URI env var.
#
services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      PSENSE_MAIL__DATABASE__BACKEND: "mongo"
      PSENSE_MAIL__DATABASE__MONGO__URI: "mongodb://localhost:27017"
      PSENSE_MAIL__DATABASE__MONGO__DB_NAME: "psense_mail"
      PSENSE_MAIL__FILE_STORAGE__BACKEND: "nas"
      PSENSE_MAIL__FILE_STORAGE__NAS__BASE_PATH: "/data/attachments"
    volumes:
      - attachments:/data/attachments

volumes:
  attachments:
