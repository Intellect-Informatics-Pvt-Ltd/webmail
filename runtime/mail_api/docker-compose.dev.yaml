# ── PSense Mail — Development overlay ────────────────────────────────────
#
# Usage:
#   docker compose -f docker-compose.yaml -f docker-compose.dev.yaml up
#
# Adds Mailpit as a local mail sandbox + wires the API to use it.
# MongoDB is assumed to be running separately on the host.
#
services:
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"      # SMTP
      - "8025:8025"      # Web UI + REST API
      - "1110:1110"      # POP3
    environment:
      MP_POP3_AUTH: "mailuser:mailpass"
      # ── SMTP relay (uncomment & fill to deliver mail to real recipients) ──
      # MP_SMTP_RELAY_HOST: "smtp.gmail.com"
      # MP_SMTP_RELAY_PORT: "587"
      # MP_SMTP_RELAY_STARTTLS: "true"
      # MP_SMTP_RELAY_AUTH: "login"
      # MP_SMTP_RELAY_USERNAME: "your-gmail@gmail.com"
      # MP_SMTP_RELAY_PASSWORD: "your-app-password"
      # MP_SMTP_RELAY_ALL: "true"

  api:
    environment:
      PSENSE_MAIL__PROVIDER__ACTIVE: "mailpit"
      PSENSE_MAIL__PROVIDER__MAILPIT__SMTP_HOST: "mailpit"
      PSENSE_MAIL__PROVIDER__MAILPIT__API_URL: "http://mailpit:8025"
      PSENSE_MAIL__PROVIDER__POP3__HOST: "mailpit"
      PSENSE_MAIL__PROVIDER__POP3__PORT: "1110"
      PSENSE_MAIL__PROVIDER__POP3__USERNAME: "mailuser"
      PSENSE_MAIL__PROVIDER__POP3__PASSWORD: "mailpass"
    depends_on:
      mailpit:
        condition: service_started
