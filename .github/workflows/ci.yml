name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runtime/mail_api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('runtime/mail_api/pyproject.toml') }}
          restore-keys: pip-
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest --tb=short -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webmail_ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/cache@v4
        with:
          path: webmail_ui/node_modules
          key: npm-${{ hashFiles('webmail_ui/package-lock.json') }}
          restore-keys: npm-
      - run: npm ci
      - run: npm run lint
      - run: npm run test:run
      - run: npm run gen:api

  openapi-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runtime/mail_api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev]"
      - run: make openapi
      - name: Verify openapi.json is up to date
        run: |
          if ! git diff --exit-code openapi.json; then
            echo "::error::openapi.json is out of date — run 'make openapi' and commit the result"
            exit 1
          fi

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: pip install -e ".[dev]"
        working-directory: runtime/mail_api
      - run: npm ci
        working-directory: webmail_ui
      - run: npx playwright install --with-deps chromium
        working-directory: webmail_ui
      - run: npm run e2e:ci
        working-directory: webmail_ui
        env:
          CI: true
